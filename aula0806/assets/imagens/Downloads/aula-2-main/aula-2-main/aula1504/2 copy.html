<script>
//entrada
let C = parseFloat(prompt("digite a temperatura em ")) ;
let F = parseFloat(prompt("digite a temperatura em fahrenheit"));
//processo
let conversao  = C * 9 / 5 + 32 ;
let conversao2 = (F-32) * 5 / 9 ;
//saida
document.write("a temperatura em fahrenheit e: "+ conversao) ;
document.write(" a temperatura em celsius e: "+ conversao2) ;




</script>
