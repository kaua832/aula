<script>
// entrada
let n1 = parseInt(prompt("Digite o valor do primeiro numero"));
let n2 = parseInt(prompt("digite o valor do segundo numero"));
// processamento
let soma =n1 + n2 ;
let sub =n1 - n2 ;
let mult =n1 * n2 ;
let potencia =n1 ** n2 ;
// Saída
document.write("A soma foi : "+ soma);
document.write(". A subtração foi : "+ sub);
document.write(". A muntiplicação foi : "+ mult);
document.write(". A potencia de "+ n1 +" elevado a "+ n2 + ":  "+ potencia);

</script>
